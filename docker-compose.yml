services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esiana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-esiana}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-esiana} -d ${POSTGRES_DB:-esiana}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  esiana:
    image: ghcr.io/esiana-ttrpg/esiana:${ESIANA_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/esiana.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://esiana:${POSTGRES_PASSWORD}@postgres:5432/esiana}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      AUTH_SECRETS_KEY: ${AUTH_SECRETS_KEY:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-production}
      UPLOADS_DIR: /data/uploads
      PLUGINS_DIR: /app/plugins
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED:-true}
    volumes:
      - uploads:/data/uploads
      - plugins:/app/plugins
    ports:
      - '${COMPOSE_HTTP_PORT:-8080}:80'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1/api/health\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  plugins:
