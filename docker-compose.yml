# Production Compose — routes HTTP through Caddy Docker Proxy (no host ports).
# Edit x-esiana-host to your public hostname before deploy.
# Local trial without Caddy: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

x-esiana-host: &esiana_host world.psl.coffee

services:
  esiana:
    image: ghcr.io/esiana-ttrpg/esiana:${ESIANA_VERSION:-latest}
    environment:
      DATABASE_URL: postgresql://esiana:${POSTGRES_PASSWORD}@postgres:5432/esiana
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      NODE_ENV: production
      UPLOADS_DIR: /data/uploads
      PLUGINS_DIR: /app/plugins
      FRONTEND_ORIGIN: ${PUBLIC_ORIGIN:-https://world.psl.coffee}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-https://world.psl.coffee}
      BACKEND_PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://world.psl.coffee}
      TRUST_PROXY: "true"
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED:-true}
      AUTH_SECRETS_KEY: ${AUTH_SECRETS_KEY:-}
    volumes:
      - uploads:/data/uploads
      - plugins:/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      caddy: *esiana_host
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - default
      - caddy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: esiana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: esiana
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U esiana -d esiana']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  caddy:
    external: true

volumes:
  pgdata:
  uploads:
  plugins:
