services:
  esiana:
    image: ghcr.io/esiana-ttrpg/esiana:${ESIANA_VERSION:-latest}
    environment:
      DATABASE_URL: postgresql://esiana:${POSTGRES_PASSWORD}@postgres:5432/esiana
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      NODE_ENV: production
      UPLOADS_DIR: /data/uploads
      PLUGINS_DIR: /app/plugins
      FRONTEND_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:${COMPOSE_HTTP_PORT:-8080}}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:${COMPOSE_HTTP_PORT:-8080}}
      BACKEND_PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:${COMPOSE_HTTP_PORT:-8080}}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ENABLE_INTERNAL_NGINX: ${ENABLE_INTERNAL_NGINX:-true}
      OPENAPI_DOCS_ENABLED: ${OPENAPI_DOCS_ENABLED:-true}
      AUTH_SECRETS_KEY: ${AUTH_SECRETS_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - uploads:/data/uploads
      - plugins:/app/plugins
    ports:
      - '${COMPOSE_HTTP_PORT:-8080}:80'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: esiana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: esiana
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U esiana -d esiana']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  plugins:
