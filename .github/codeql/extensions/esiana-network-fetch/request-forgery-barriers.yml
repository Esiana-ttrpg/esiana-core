# CodeQL barriers for networkFetch SSRF (js/request-forgery).
# Module types must match ESM import specifiers from networkFetch.ts (verified via CodeQL DB).
# barrierGuardModel: sync guard in same function as fetch(url).
extensions:
  - addsTo:
      pack: codeql/javascript-all
      extensible: barrierGuardModel
    data:
      - ["./ssrfGuard.js", "Member[isUrlSafeForImportSync].Argument[0]", "true", "request-forgery"]
      - ["./pluginSourcePolicy.js", "Member[isPluginSourceUrlSync].Argument[0]", "true", "request-forgery"]
