# CodeQL barriers for networkFetch SSRF (js/request-forgery).
# Pack manifest: codeql-pack.yml (required name for default-setup auto-discovery).
# Primary: barrierModel on resolve*SafeForRemoteFetch return values (validatedUrl boundary).
# Secondary: barrierGuardModel on sync pre-checks for early-reject branches.
extensions:
  - addsTo:
      pack: codeql/javascript-all
      extensible: barrierGuardModel
    data:
      - ["backend/src/lib/ssrfGuard.js", "Member[isUrlSafeForImportSync].Argument[0]", "true", "request-forgery"]
      - ["backend/src/lib/ssrfGuard.ts", "Member[isUrlSafeForImportSync].Argument[0]", "true", "request-forgery"]
      - ["src/lib/ssrfGuard.js", "Member[isUrlSafeForImportSync].Argument[0]", "true", "request-forgery"]
      - ["src/lib/ssrfGuard.ts", "Member[isUrlSafeForImportSync].Argument[0]", "true", "request-forgery"]
      - ["backend/src/lib/pluginSourcePolicy.js", "Member[isPluginSourceUrlSync].Argument[0]", "true", "request-forgery"]
      - ["backend/src/lib/pluginSourcePolicy.ts", "Member[isPluginSourceUrlSync].Argument[0]", "true", "request-forgery"]
      - ["src/lib/pluginSourcePolicy.js", "Member[isPluginSourceUrlSync].Argument[0]", "true", "request-forgery"]
      - ["src/lib/pluginSourcePolicy.ts", "Member[isPluginSourceUrlSync].Argument[0]", "true", "request-forgery"]
  - addsTo:
      pack: codeql/javascript-all
      extensible: barrierModel
    data:
      - ["backend/src/lib/ssrfGuard.js", "Member[resolveUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["backend/src/lib/ssrfGuard.ts", "Member[resolveUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["src/lib/ssrfGuard.js", "Member[resolveUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["src/lib/ssrfGuard.ts", "Member[resolveUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["backend/src/lib/pluginSourcePolicy.js", "Member[resolvePluginUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["backend/src/lib/pluginSourcePolicy.ts", "Member[resolvePluginUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["src/lib/pluginSourcePolicy.js", "Member[resolvePluginUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
      - ["src/lib/pluginSourcePolicy.ts", "Member[resolvePluginUrlSafeForRemoteFetch].ReturnValue", "request-forgery"]
