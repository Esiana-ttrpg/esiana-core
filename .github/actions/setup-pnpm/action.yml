name: Setup pnpm
description: Install pnpm, cache store, and install dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
