name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Build workspaces
        run: pnpm build

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm

      - name: Validate dual-engine portability
        working-directory: backend
        run: node prisma/scripts/validate-dual-engine-portability.mjs

      - name: Prepare SQLite test database
        working-directory: backend
        run: |
          echo 'DATABASE_URL="file:./ci-test.db"' > .env
          DATABASE_URL=file:./ci-test.db node prisma/scripts/deploy-sqlite-migrations.mjs --reset
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          pnpm exec prisma generate

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: file:./ci-test.db
        run: pnpm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esiana
          POSTGRES_PASSWORD: esiana_ci
          POSTGRES_DB: esiana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esiana -d esiana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm

      - name: Validate baseline migration portability
        working-directory: backend
        run: |
          node prisma/scripts/validate-dual-engine-portability.mjs
          node prisma/scripts/validate-baseline-fk-order.mjs
          node prisma/scripts/validate-postgres-identifier-length.mjs

      - name: Prepare Postgres test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: pnpm test

  docker-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-docker-build
      JWT_SECRET: ci-docker-build-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Reject UTF-8 BOM in Docker packaging files
        run: |
          for f in docker/*.sh docker/esiana.Dockerfile; do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              echo "UTF-8 BOM detected in $f" >&2
              exit 1
            fi
          done

      - name: Assert Postgres health-gated startup
        run: |
          docker compose config | grep -c 'condition: service_healthy' | grep -q '^1$'

  prepare-release-meta:
    needs: [build, test-sqlite, test-postgres, docker-build]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      semver: ${{ steps.meta.outputs.semver }}
      product_version: ${{ steps.meta.outputs.product_version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$SEMVER" != "$PKG" ]; then
            echo "Tag v${SEMVER} does not match package.json ${PKG}" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "product_version=${PKG}" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -Eq '-(rc|beta|alpha|pre)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject UTF-8 BOM in Docker packaging files
        run: |
          for f in docker/*.sh docker/esiana.Dockerfile; do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              echo "UTF-8 BOM detected in $f" >&2
              exit 1
            fi
          done

  # Node/pnpm under QEMU user-mode emulation for linux/arm64 hits SIGILL (exit 132)
  # during install. Build each architecture on a native runner, push by digest, then
  # merge into one multi-arch manifest.
  build-image:
    needs: prepare-release-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact_slug: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_slug: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esiana.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/esiana-ttrpg/esiana,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ESIANA_PRODUCT_VERSION=${{ needs.prepare-release-meta.outputs.product_version }}
          cache-from: type=gha,scope=esiana-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=esiana-${{ matrix.platform }}
          provenance: true
          labels: |
            org.opencontainers.image.version=${{ needs.prepare-release-meta.outputs.tag }}
            org.opencontainers.image.source=https://github.com/Esiana-ttrpg/esiana-core
            org.opencontainers.image.description=Self-hosted narrative infrastructure for long-form TTRPG campaigns

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Verify image on native platform
        run: |
          set -euo pipefail
          digest="${{ steps.build.outputs.digest }}"
          IMAGE="ghcr.io/esiana-ttrpg/esiana@${digest}"
          arch=$(docker run --rm --entrypoint uname "$IMAGE" -m)
          case "${{ matrix.platform }}" in
            linux/amd64)
              test "$arch" = "x86_64" || { echo "expected x86_64, got: $arch"; exit 1; }
              ;;
            linux/arm64)
              test "$arch" = "aarch64" || { echo "expected aarch64, got: $arch"; exit 1; }
              docker run --rm --entrypoint /bin/sh "$IMAGE" -c 'test -x /entrypoint.sh'
              ;;
            *)
              echo "unknown platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact_slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-images:
    needs: [prepare-release-meta, build-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest (GHCR + Docker Hub)
        env:
          TAG: ${{ needs.prepare-release-meta.outputs.tag }}
          SEMVER: ${{ needs.prepare-release-meta.outputs.semver }}
          IS_PRERELEASE: ${{ needs.prepare-release-meta.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          DIGEST_FILES=(/tmp/digests/*)
          if [ "${#DIGEST_FILES[@]}" -ne 2 ]; then
            echo "Expected 2 digest artifacts (linux/amd64 + linux/arm64), found ${#DIGEST_FILES[@]}:" >&2
            ls -la /tmp/digests >&2
            exit 1
          fi
          TAGS=(
            "ghcr.io/esiana-ttrpg/esiana:${TAG}"
            "ghcr.io/esiana-ttrpg/esiana:${SEMVER}"
            "docker.io/esiana/esiana:${TAG}"
            "docker.io/esiana/esiana:${SEMVER}"
          )
          if [ "$IS_PRERELEASE" = "false" ]; then
            TAGS+=(
              "ghcr.io/esiana-ttrpg/esiana:latest"
              "docker.io/esiana/esiana:latest"
            )
          fi
          ARGS=()
          for t in "${TAGS[@]}"; do
            ARGS+=(-t "$t")
          done
          for f in "${DIGEST_FILES[@]}"; do
            digest="$(basename "$f")"
            ARGS+=("ghcr.io/esiana-ttrpg/esiana@sha256:${digest}")
          done
          docker buildx imagetools create "${ARGS[@]}"

      - name: Verify multi-arch manifests
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare-release-meta.outputs.tag }}"
          for ref in \
            "ghcr.io/esiana-ttrpg/esiana:${TAG}" \
            "docker.io/esiana/esiana:${TAG}"; do
            inspect=$(docker buildx imagetools inspect "$ref")
            echo "$inspect"
            echo "$inspect" | grep -q 'linux/amd64'
            echo "$inspect" | grep -q 'linux/arm64'
          done

      - name: Verify tagged amd64 manifest resolves (GHCR)
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare-release-meta.outputs.tag }}"
          IMAGE="ghcr.io/esiana-ttrpg/esiana:${TAG}"
          amd=$(docker run --rm --entrypoint uname "$IMAGE" -m)
          test "$amd" = "x86_64" || { echo "amd64 runtime got: $amd"; exit 1; }

  github-release:
    needs: [build, test-sqlite, test-postgres, docker-build, publish-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${GITHUB_SHA}" \
              -f previous_tag_name="$PREV" \
              --jq .body > release-notes.md
          else
            echo "# Esiana ${TAG}" > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "# Esiana ${TAG}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [GitHub Releases](https://github.com/${GITHUB_REPOSITORY}/releases)." >> release-notes.md
          fi
          {
            echo ""
            echo "## Container image"
            echo ""
            echo "\`\`\`"
            echo "ghcr.io/esiana-ttrpg/esiana:${TAG}"
            echo "docker.io/esiana/esiana:${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Both registries are published in a single multi-arch build (not mirrored)."
            echo ""
            echo "Multi-arch: \`linux/amd64\`, \`linux/arm64\`. Verify manifest metadata:"
            echo ""
            echo "\`\`\`bash"
            echo "docker buildx imagetools inspect ghcr.io/esiana-ttrpg/esiana:${TAG}"
            echo "docker buildx imagetools inspect docker.io/esiana/esiana:${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Verify runtime platform (manifest inspect alone is not sufficient):"
            echo ""
            echo "\`\`\`bash"
            echo "docker run --rm --platform linux/arm64 --entrypoint uname ghcr.io/esiana-ttrpg/esiana:${TAG} -m"
            echo "docker run --rm --platform linux/amd64 --entrypoint uname ghcr.io/esiana-ttrpg/esiana:${TAG} -m"
            echo "docker compose pull"
            echo "docker compose up -d"
            echo "\`\`\`"
            echo ""
            echo "See [Self-hosting installation](https://github.com/Esiana-ttrpg/docs/blob/main/self-hosting/installation.md)."
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Esiana ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
