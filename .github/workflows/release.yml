name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Build workspaces
        run: pnpm -r build

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Validate dual-engine portability
        working-directory: backend
        run: node prisma/scripts/validate-dual-engine-portability.mjs

      - name: Prepare SQLite test database
        working-directory: backend
        run: |
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/migrations/migration_lock.toml
          echo 'DATABASE_URL="file:./ci-test.db"' > .env
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: file:./ci-test.db
        run: pnpm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esiana
          POSTGRES_PASSWORD: esiana_ci
          POSTGRES_DB: esiana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esiana -d esiana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Validate baseline migration portability
        working-directory: backend
        run: |
          node prisma/scripts/validate-dual-engine-portability.mjs
          node prisma/scripts/validate-baseline-fk-order.mjs
          node prisma/scripts/validate-postgres-identifier-length.mjs

      - name: Prepare Postgres test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: pnpm test

  docker-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-docker-build
      JWT_SECRET: ci-docker-build-secret-not-for-production
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Reject UTF-8 BOM in Docker packaging files
        run: |
          for f in docker/*.sh docker/esiana.Dockerfile; do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              echo "UTF-8 BOM detected in $f" >&2
              exit 1
            fi
          done

      - name: Assert Postgres health-gated startup
        run: |
          docker compose config | grep -c 'condition: service_healthy' | grep -q '^1$'

  publish-images:
    needs: [build, test-sqlite, test-postgres, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tags
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -Eq '-(rc|beta|alpha|pre)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Reject UTF-8 BOM in Docker packaging files
        run: |
          for f in docker/*.sh docker/esiana.Dockerfile; do
            if [ "$(head -c 3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              echo "UTF-8 BOM detected in $f" >&2
              exit 1
            fi
          done

      - name: Prepare image tag lists
        id: tags
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          SEMVER="${{ steps.meta.outputs.semver }}"
          IMAGE_TAGS="ghcr.io/esiana-ttrpg/esiana:${TAG}
          ghcr.io/esiana-ttrpg/esiana:${SEMVER}
          docker.io/esiana/esiana:${TAG}
          docker.io/esiana/esiana:${SEMVER}"
          if [ "${{ steps.meta.outputs.is_prerelease }}" = "false" ]; then
            IMAGE_TAGS="${IMAGE_TAGS}
          ghcr.io/esiana-ttrpg/esiana:latest
          docker.io/esiana/esiana:latest"
          fi
          {
            echo "image<<EOF"
            echo "$IMAGE_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Esiana image (GHCR + Docker Hub)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/esiana.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.source=https://github.com/Esiana-ttrpg/esiana-core
            org.opencontainers.image.description=Self-hosted narrative infrastructure for long-form TTRPG campaigns

      - name: Verify multi-arch manifests
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          for ref in \
            "ghcr.io/esiana-ttrpg/esiana:${TAG}" \
            "docker.io/esiana/esiana:${TAG}"; do
            docker buildx imagetools inspect "$ref" | grep -E 'linux/(amd64|arm64)'
          done

      - name: Verify runtime platform invariants (GHCR)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          IMAGE="ghcr.io/esiana-ttrpg/esiana:${TAG}"
          arm=$(docker run --rm --platform linux/arm64 --entrypoint uname "$IMAGE" -m)
          amd=$(docker run --rm --platform linux/amd64 --entrypoint uname "$IMAGE" -m)
          test "$arm" = "aarch64" || { echo "arm64 runtime got: $arm"; exit 1; }
          test "$amd" = "x86_64" || { echo "amd64 runtime got: $amd"; exit 1; }

      - name: Verify arm64 runtime packaging (GHCR)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          IMAGE="ghcr.io/esiana-ttrpg/esiana:${TAG}"
          docker run --rm --platform linux/arm64 \
            --workdir /app/backend --entrypoint node "$IMAGE" \
            --input-type=module -e "import('@esiana/storage-s3')"
          docker run --rm --platform linux/arm64 \
            --entrypoint /bin/sh "$IMAGE" \
            -c 'test -x /entrypoint.sh'

  github-release:
    needs: [build, test-sqlite, test-postgres, docker-build, publish-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${GITHUB_SHA}" \
              -f previous_tag_name="$PREV" \
              --jq .body > release-notes.md
          else
            echo "# Esiana ${TAG}" > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "# Esiana ${TAG}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [GitHub Releases](https://github.com/${GITHUB_REPOSITORY}/releases)." >> release-notes.md
          fi
          {
            echo ""
            echo "## Container image"
            echo ""
            echo "\`\`\`"
            echo "ghcr.io/esiana-ttrpg/esiana:${TAG}"
            echo "docker.io/esiana/esiana:${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Both registries are published in a single multi-arch build (not mirrored)."
            echo ""
            echo "Multi-arch: \`linux/amd64\`, \`linux/arm64\`. Verify manifest metadata:"
            echo ""
            echo "\`\`\`bash"
            echo "docker buildx imagetools inspect ghcr.io/esiana-ttrpg/esiana:${TAG}"
            echo "docker buildx imagetools inspect docker.io/esiana/esiana:${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Verify runtime platform (manifest inspect alone is not sufficient):"
            echo ""
            echo "\`\`\`bash"
            echo "docker run --rm --platform linux/arm64 --entrypoint uname ghcr.io/esiana-ttrpg/esiana:${TAG} -m"
            echo "docker run --rm --platform linux/amd64 --entrypoint uname ghcr.io/esiana-ttrpg/esiana:${TAG} -m"
            echo "docker compose pull"
            echo "docker compose up -d"
            echo "\`\`\`"
            echo ""
            echo "See [Self-hosting installation](https://github.com/Esiana-ttrpg/docs/blob/main/self-hosting/installation.md)."
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Esiana ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
