name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=backend

      - name: Build storage-s3 package
        run: npm run build --workspace=@esiana/storage-s3

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build backend
        run: npm run build --workspace=backend

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare SQLite test database
        working-directory: backend
        run: |
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/migrations/migration_lock.toml
          echo 'DATABASE_URL="file:./ci-test.db"' > .env
          npx prisma generate
          npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: file:./ci-test.db
        run: npm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esiana
          POSTGRES_PASSWORD: esiana_ci
          POSTGRES_DB: esiana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esiana -d esiana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate baseline migration portability
        working-directory: backend
        run: |
          node prisma/scripts/validate-baseline-fk-order.mjs
          node prisma/scripts/validate-postgres-identifier-length.mjs

      - name: Prepare Postgres test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-docker-build
      JWT_SECRET: ci-docker-build-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Assert health-based startup ordering
        run: |
          docker compose config | grep -c 'condition: service_healthy' | grep -q '^1$'

      - name: Build images
        run: docker compose build

  publish-images:
    needs: [build, test-sqlite, test-postgres, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -Eq '-(rc|beta|alpha|pre)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Prepare image tag lists
        id: tags
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          SEMVER="${{ steps.meta.outputs.semver }}"
          IMAGE_TAGS="ghcr.io/esiana-ttrpg/esiana:${TAG}
          ghcr.io/esiana-ttrpg/esiana:${SEMVER}"
          if [ "${{ steps.meta.outputs.is_prerelease }}" = "false" ]; then
            IMAGE_TAGS="${IMAGE_TAGS}
          ghcr.io/esiana-ttrpg/esiana:latest"
          fi
          {
            echo "image<<EOF"
            echo "$IMAGE_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Esiana image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esiana.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.image }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.source=https://github.com/Esiana-ttrpg/esiana-core
            org.opencontainers.image.description=Self-hosted narrative infrastructure for long-form TTRPG campaigns

  github-release:
    needs: [build, test-sqlite, test-postgres, docker-build, publish-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${GITHUB_SHA}" \
              -f previous_tag_name="$PREV" \
              --jq .body > release-notes.md
          else
            echo "# Esiana ${TAG}" > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "# Esiana ${TAG}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [GitHub Releases](https://github.com/${GITHUB_REPOSITORY}/releases)." >> release-notes.md
          fi
          {
            echo ""
            echo "## Container image"
            echo ""
            echo "\`\`\`"
            echo "ghcr.io/esiana-ttrpg/esiana:${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Set \`ESIANA_VERSION=${TAG}\` in your \`.env\`, then:"
            echo ""
            echo "\`\`\`bash"
            echo "docker compose pull"
            echo "docker compose up -d"
            echo "\`\`\`"
            echo ""
            echo "See [Self-hosting installation](https://github.com/Esiana-ttrpg/docs/blob/main/self-hosting/installation.md)."
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Esiana ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
