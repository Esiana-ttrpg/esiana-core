name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=backend

      - name: Build storage-s3 package
        run: npm run build --workspace=@esiana/storage-s3

      - name: Build ssrf-guard package
        run: npm run build --workspace=@esiana/ssrf-guard

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build backend
        run: npm run build --workspace=backend

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ssrf-guard package
        run: npm run build --workspace=@esiana/ssrf-guard

      - name: Prepare SQLite test database
        working-directory: backend
        run: |
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/migrations/migration_lock.toml
          echo 'DATABASE_URL="file:./ci-test.db"' > .env
          npx prisma generate
          npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: file:./ci-test.db
        run: npm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esiana
          POSTGRES_PASSWORD: esiana_ci
          POSTGRES_DB: esiana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esiana -d esiana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ssrf-guard package
        run: npm run build --workspace=@esiana/ssrf-guard

      - name: Validate baseline migration portability
        working-directory: backend
        run: |
          node prisma/scripts/validate-baseline-fk-order.mjs
          node prisma/scripts/validate-postgres-identifier-length.mjs

      - name: Prepare Postgres test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-docker-build
      JWT_SECRET: ci-docker-build-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Assert health-based startup ordering
        run: |
          docker compose config | grep -c 'condition: service_healthy' | grep -q '^2$'

      - name: Build images
        run: docker compose build
