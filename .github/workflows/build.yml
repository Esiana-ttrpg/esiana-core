name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/reject-npm-lockfile

      - uses: ./.github/actions/setup-pnpm

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Build workspaces
        run: pnpm build

      - name: Validate i18n locale keys
        working-directory: frontend
        run: node scripts/validate-i18n-keys.mjs

      - name: Verify compiled backend shared modules are ESM
        working-directory: backend
        run: node scripts/verify-dist-esm.mjs

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/reject-npm-lockfile

      - uses: ./.github/actions/setup-pnpm

      - name: Validate dual-engine portability
        working-directory: backend
        run: node prisma/scripts/validate-dual-engine-portability.mjs

      - name: Verify outbound fetch boundary
        working-directory: backend
        run: node scripts/check-fetch-boundary.mjs

      - name: Prepare SQLite test database
        working-directory: backend
        run: |
          echo 'DATABASE_URL="file:./ci-test.db"' > .env
          DATABASE_URL=file:./ci-test.db node prisma/scripts/deploy-sqlite-migrations.mjs --reset
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          pnpm exec prisma generate

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: file:./ci-test.db
        run: pnpm test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esiana
          POSTGRES_PASSWORD: esiana_ci
          POSTGRES_DB: esiana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U esiana -d esiana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/reject-npm-lockfile

      - uses: ./.github/actions/setup-pnpm

      - name: Validate baseline migration portability
        working-directory: backend
        run: |
          node prisma/scripts/validate-dual-engine-portability.mjs
          node prisma/scripts/validate-baseline-fk-order.mjs
          node prisma/scripts/validate-postgres-identifier-length.mjs

      - name: Verify outbound fetch boundary
        working-directory: backend
        run: node scripts/check-fetch-boundary.mjs

      - name: Prepare Postgres test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://esiana:esiana_ci@localhost:5432/esiana
        run: pnpm test

  docker-build:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-docker-build
      JWT_SECRET: ci-docker-build-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Assert Postgres health-gated startup
        run: |
          docker compose config | grep -c 'condition: service_healthy' | grep -q '^1$'

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/esiana.Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: esiana:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify core image starts without optional workspace plugins
        run: |
          docker run --rm --platform linux/amd64 \
            --entrypoint /bin/sh esiana:ci \
            -c 'test -x /entrypoint.sh'
