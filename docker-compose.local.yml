# Optional override for local HTTP access without Caddy Docker Proxy.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  esiana:
    ports:
      - '${COMPOSE_HTTP_PORT:-8080}:80'
    environment:
      FRONTEND_ORIGIN: http://localhost:${COMPOSE_HTTP_PORT:-8080}
      CORS_ORIGIN: http://localhost:${COMPOSE_HTTP_PORT:-8080}
      BACKEND_PUBLIC_ORIGIN: http://localhost:${COMPOSE_HTTP_PORT:-8080}
      TRUST_PROXY: 'false'
    labels: {}
    networks:
      - default
